
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --c1:#0f0c29;--c2:#302b63;--c3:#24243e;
    --accent:#f7c948;--accent2:#ff6b6b;--accent3:#6bcbf7;
    --correct:#4ade80;--wrong:#f87171;--neutral:#e2e8f0;
    --card:#1e1b4b;--cardlit:#2d2a6e;
  }
  body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));color:#fff;overflow-x:hidden}
  .app{max-width:720px;margin:0 auto;padding:1.5rem 1rem 3rem;min-height:100vh;display:flex;flex-direction:column;gap:1.5rem}

  /* HOME SCREEN */
  .home-header{text-align:center;padding:2.5rem 0 1rem}
  .quiz-logo{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;letter-spacing:-2px;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
  .quiz-sub{font-size:.95rem;color:#a5b4fc;margin-top:.5rem;letter-spacing:1px;text-transform:uppercase;font-weight:300}
  .topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
  .topic-card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2rem 1.5rem;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s;text-align:center}
  .topic-card:hover{background:var(--cardlit);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .topic-icon{font-size:2.8rem;margin-bottom:.75rem;display:block}
  .topic-name{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:.3rem}
  .topic-meta{font-size:.8rem;color:#818cf8;font-weight:300}
  .topic-badge{display:inline-block;background:rgba(247,201,72,.15);color:var(--accent);font-size:.7rem;padding:.2rem .6rem;border-radius:100px;margin-top:.5rem;border:1px solid rgba(247,201,72,.3)}

  /* QUIZ SCREEN */
  .quiz-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  .back-btn{background:rgba(255,255,255,.08);border:none;color:#fff;padding:.5rem 1rem;border-radius:100px;cursor:pointer;font-size:.85rem;font-family:'DM Sans',sans-serif;transition:background .2s}
  .back-btn:hover{background:rgba(255,255,255,.18)}
  .topic-label{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent)}
  .score-pill{background:rgba(107,203,247,.15);border:1px solid rgba(107,203,247,.3);color:var(--accent3);padding:.4rem 1rem;border-radius:100px;font-size:.85rem;font-weight:500}
  .progress-wrap{background:rgba(255,255,255,.1);border-radius:100px;height:6px;width:100%}
  .progress-bar{height:6px;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .q-count{font-size:.8rem;color:#818cf8;text-align:right}

  .question-card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:2rem;animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .q-marks-tag{display:inline-block;background:rgba(247,201,72,.12);color:var(--accent);font-size:.72rem;padding:.2rem .7rem;border-radius:100px;margin-bottom:1rem;border:1px solid rgba(247,201,72,.25)}
  .question-text{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:600;line-height:1.5;margin-bottom:1.5rem}

  .options{display:flex;flex-direction:column;gap:.7rem}
  .option-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:1rem 1.25rem;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:.95rem;color:#e2e8f0;transition:all .18s;display:flex;align-items:center;gap:1rem}
  .option-btn:hover:not(:disabled){background:rgba(165,180,252,.12);border-color:rgba(165,180,252,.4);transform:translateX(4px)}
  .option-letter{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0;font-family:'Syne',sans-serif}
  .option-btn.correct{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.5);color:var(--correct)}
  .option-btn.correct .option-letter{border-color:var(--correct);color:var(--correct);background:rgba(74,222,128,.15)}
  .option-btn.wrong{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);color:var(--wrong)}
  .option-btn.wrong .option-letter{border-color:var(--wrong);color:var(--wrong)}
  .option-btn:disabled{cursor:default}

  .feedback-box{border-radius:14px;padding:.9rem 1.1rem;font-size:.9rem;font-weight:500;display:none;animation:fadeUp .25s ease}
  .feedback-box.correct{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--correct);display:block}
  .feedback-box.wrong{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--wrong);display:block}
  .feedback-box.invalid{background:rgba(247,201,72,.1);border:1px solid rgba(247,201,72,.3);color:var(--accent);display:block}

  .next-btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--accent),#f59e0b);color:#1a1a2e;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:.5rem;display:none}
  .next-btn:hover{opacity:.9;transform:scale(.99)}
  .next-btn.visible{display:block;animation:fadeUp .3s ease}

  /* RESULTS SCREEN */
  .results-card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:2.5rem 2rem;text-align:center;animation:fadeUp .5s ease}
  .result-topic{font-size:.85rem;color:#818cf8;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}
  .result-score-big{font-family:'Syne',sans-serif;font-size:5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .result-outof{font-size:1rem;color:#818cf8;margin-top:.3rem}
  .result-bar-wrap{background:rgba(255,255,255,.08);border-radius:100px;height:10px;margin:1.5rem 0;overflow:hidden}
  .result-bar{height:10px;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width 1s cubic-bezier(.4,0,.2,1)}
  .result-grade{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin:.5rem 0}
  .result-msg{font-size:.9rem;color:#a5b4fc;margin-bottom:1.5rem}
  .result-btns{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
  .result-btn{padding:.8rem 1.5rem;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;border:none;transition:opacity .2s,transform .1s}
  .result-btn:hover{opacity:.85;transform:scale(.98)}
  .result-btn.primary{background:linear-gradient(135deg,var(--accent),#f59e0b);color:#1a1a2e;font-weight:700}
  .result-btn.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
  .stat-row{display:flex;justify-content:center;gap:1.5rem;margin:1.25rem 0;flex-wrap:wrap}
  .stat-item{text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700}
  .stat-lbl{font-size:.72rem;color:#818cf8;text-transform:uppercase;letter-spacing:.5px}

  /* EXIT screen */
  .exit-card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:2rem;text-align:center}
  .exit-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
  .exit-msg{color:#a5b4fc;font-size:.9rem;margin-bottom:1.5rem}

  .screen{display:none}
  .screen.active{display:flex;flex-direction:column;gap:1.25rem}
</style>

<div class="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <div class="quiz-logo">QUIZ<span style="-webkit-text-fill-color:#f7c948">.</span></div>
      <p class="quiz-sub">Test your knowledge</p>
    </div>
    <div class="topic-grid">
      <div class="topic-card" onclick="startQuiz('C')">
        <span class="topic-icon">⚙️</span>
        <div class="topic-name">C Language</div>
        <div class="topic-meta">10 Questions</div>
        <span class="topic-badge">20 marks</span>
      </div>
      <div class="topic-card" onclick="startQuiz('DBMS')">
        <span class="topic-icon">🗄️</span>
        <div class="topic-name">DBMS</div>
        <div class="topic-meta">10 Questions</div>
        <span class="topic-badge">20 marks</span>
      </div>
      <div class="topic-card" onclick="startQuiz('HTML')">
        <span class="topic-icon">🌐</span>
        <div class="topic-name">HTML</div>
        <div class="topic-meta">10 Questions</div>
        <span class="topic-badge">20 marks</span>
      </div>
    </div>
    <p style="text-align:center;font-size:.78rem;color:#4c4f7a;margin-top:auto">Each correct answer carries 2 marks &nbsp;·&nbsp; No negative marking</p>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <span class="topic-label" id="quiz-topic-label"></span>
      <span class="score-pill" id="score-display">Score: 0</span>
    </div>
    <div>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:10%"></div></div>
      <p class="q-count" id="q-count" style="margin-top:.4rem"></p>
    </div>
    <div class="question-card" id="question-card">
      <div class="q-marks-tag">2 marks per question</div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-container"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-result">
    <div class="results-card">
      <div class="result-topic" id="result-topic"></div>
      <div class="result-score-big" id="result-score"></div>
      <div class="result-outof">out of 20</div>
      <div class="result-bar-wrap"><div class="result-bar" id="result-bar" style="width:0%"></div></div>
      <div class="result-grade" id="result-grade"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-num" id="stat-correct" style="color:#4ade80"></div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-wrong" style="color:#f87171"></div>
          <div class="stat-lbl">Wrong</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-pct" style="color:#f7c948"></div>
          <div class="stat-lbl">Accuracy</div>
        </div>
      </div>
      <div class="result-btns">
        <button class="result-btn primary" onclick="retryQuiz()">Retry Quiz</button>
        <button class="result-btn secondary" onclick="goHome()">Choose Topic</button>
      </div>
    </div>
  </div>

</div>

<script>
const QUESTIONS = {
  C: [
    {q:"Who is the creator of C language?",opts:["James Gosling","Dennis Ritchie","Bjarne Stroustrup","Guido van Rossum"],ans:1},
    {q:"What is the return type of the main function in C language?",opts:["void","int","float","char"],ans:1},
    {q:"In C language, '%d' is used for which type of data?",opts:["char","float","int","double"],ans:2},
    {q:"Which type of loop is a pre-test loop in C language?",opts:["do-while","while","goto","for"],ans:1},
    {q:"Which header file is used for printf()?",opts:["stdlib.h","conio.h","stdio.h","string.h"],ans:2},
    {q:"Which operator represents the logical AND operator?",opts:["&","&&","|","||"],ans:1},
    {q:"Which keyword is used for a constant variable in C?",opts:["fixed","static","final","const"],ans:3},
    {q:"Which is the correct file extension for a C program?",opts:[".CP",".C",".CPP",".CS"],ans:1},
    {q:"Which of the following is used to take input from the user in C?",opts:["cin","gets()","input()","scanf()"],ans:3},
    {q:"Which of the following is NOT a loop in C?",opts:["for","while","do-while","foreach"],ans:3}
  ],
  DBMS: [
    {q:"What is the full form of DBMS?",opts:["Data Base Management System","Data Backup Management System","Data Base Machine System","Digital Base Management Software"],ans:0},
    {q:"Which of the following is NOT a type of database?",opts:["Hierarchical","Network","Relational","Linear"],ans:3},
    {q:"Which language is used to access data in a database?",opts:["HTML","SQL","C++","XML"],ans:1},
    {q:"What is a primary key?",opts:["A field that allows null values","A field that uniquely identifies each record","A key used to encrypt data","A duplicate field in a table"],ans:1},
    {q:"What is the full form of SQL?",opts:["Structured Query Language","Sequential Query Language","Simple Query Language","Server Query Language"],ans:0},
    {q:"Which of the following is a DDL command?",opts:["INSERT","SELECT","CREATE","UPDATE"],ans:2},
    {q:"Which command deletes all rows from a table but NOT the table itself?",opts:["TRUNCATE","SELECT","CREATE","UPDATE"],ans:0},
    {q:"What is the purpose of a foreign key?",opts:["To uniquely identify a row","To enforce referential integrity","To store encrypted data","To speed up queries"],ans:1},
    {q:"Which of the following is a NoSQL database?",opts:["Oracle","MySQL","MongoDB","PostgreSQL"],ans:2},
    {q:"Which of the following is used to maintain data integrity?",opts:["Cursor","Joins","Constraints","Views"],ans:2}
  ],
  HTML: [
    {q:"What is the full form of HTML?",opts:["Hyper Text Makeup Language","Hyper Text Markup Language","Hyperlinks and Text Mark Language","Hyper Tool Markup Language"],ans:1},
    {q:"Which tag is used for a paragraph in HTML?",opts:["<div>","<h1>","<paragraph>","<p>"],ans:3},
    {q:"Which tag is used for adding an image in HTML?",opts:["<h3>","<pre>","<img>","<p>"],ans:2},
    {q:"Which tag is used to set the title in HTML?",opts:["<meta>","<head>","<header>","<title>"],ans:3},
    {q:"Which attribute defines the source of an image in HTML?",opts:["href","src","path","link"],ans:1},
    {q:"Which tag is used to create a hyperlink in HTML?",opts:["<a>","<b>","<link>","<url>"],ans:0},
    {q:"Which tag is used to create a form in HTML?",opts:["<submit>","<input>","<form>","<button>"],ans:2},
    {q:"Which tag is used to insert a line break in HTML?",opts:["<b>","<i>","<newline>","<br>"],ans:3},
    {q:"Which tag is used to create a table in HTML?",opts:["<form>","<table>","<tab>","<td>"],ans:1},
    {q:"Which tag is used for bold text in HTML?",opts:["<strongtag>","<strongtext>","<bold>","<b>"],ans:3}
  ]
};

let currentTopic='',currentQ=0,score=0,correctCount=0,wrongCount=0,answered=false,retryTopic='';
const letters=['A','B','C','D'];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome(){show('screen-home');}

function startQuiz(topic){
  currentTopic=topic;retryTopic=topic;currentQ=0;score=0;correctCount=0;wrongCount=0;
  document.getElementById('quiz-topic-label').textContent=topic==='C'?'C Language':topic;
  document.getElementById('score-display').textContent='Score: 0';
  show('screen-quiz');
  loadQuestion();
}

function loadQuestion(){
  answered=false;
  const qs=QUESTIONS[currentTopic];
  const q=qs[currentQ];
  const total=qs.length;
  document.getElementById('progress-bar').style.width=((currentQ+1)/total*100)+'%';
  document.getElementById('q-count').textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById('question-text').textContent=`Q${currentQ+1}. ${q.q}`;
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box';fb.textContent='';
  const nb=document.getElementById('next-btn');nb.className='next-btn';
  const container=document.getElementById('options-container');
  container.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>selectOption(i,btn);
    container.appendChild(btn);
  });
}

function selectOption(idx,btn){
  if(answered)return;
  answered=true;
  const q=QUESTIONS[currentTopic][currentQ];
  const allBtns=document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback-box');
  if(idx===q.ans){
    btn.classList.add('correct');
    score+=2;correctCount++;
    document.getElementById('score-display').textContent=`Score: ${score}`;
    fb.className='feedback-box correct';
    fb.textContent='✓ Correct! Well done!';
  } else {
    btn.classList.add('wrong');wrongCount++;
    allBtns[q.ans].classList.add('correct');
    fb.className='feedback-box wrong';
    fb.textContent=`✗ Wrong! Correct answer: ${letters[q.ans]}. ${q.opts[q.ans]}`;
  }
  const nb=document.getElementById('next-btn');
  const isLast=(currentQ===QUESTIONS[currentTopic].length-1);
  nb.textContent=isLast?'View Results →':'Next Question →';
  nb.className='next-btn visible';
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=QUESTIONS[currentTopic].length){showResult();}
  else{loadQuestion();}
}

function showResult(){
  const pct=Math.round(score/20*100);
  document.getElementById('result-topic').textContent=(currentTopic==='C'?'C Language':currentTopic)+' Quiz — Complete!';
  document.getElementById('result-score').textContent=score;
  document.getElementById('stat-correct').textContent=correctCount;
  document.getElementById('stat-wrong').textContent=wrongCount;
  document.getElementById('stat-pct').textContent=pct+'%';
  setTimeout(()=>{document.getElementById('result-bar').style.width=pct+'%';},100);
  let grade,msg;
  if(score===20){grade='🏆 Perfect Score!';msg='Outstanding! You got every question right.';}
  else if(score>=16){grade='⭐ Excellent!';msg='Great job — you really know your stuff!';}
  else if(score>=12){grade='👍 Good Work!';msg='Solid effort! A bit more practice and you\'ll ace it.';}
  else if(score>=8){grade='📖 Keep Practicing';msg='You\'re getting there — review the topic and try again.';}
  else{grade='💪 Don\'t Give Up!';msg='Everyone starts somewhere. Brush up and give it another shot!';}
  document.getElementById('result-grade').textContent=grade;
  document.getElementById('result-msg').textContent=msg;
  show('screen-result');
}

function retryQuiz(){startQuiz(retryTopic);}
</script>
